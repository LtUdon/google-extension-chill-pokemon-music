<html>
  <head>
    <link rel="stylesheet" href="musicDex.css">
  </head>
  <body>
    <h1>Music Dex</h1>
    <div id="source-control">
      <button id="source-button" tag="utilities" title="Source">^</button>
    </div>
    
    <div id="music-info">
      <img id="thumbnail" src="" alt="Album Art" width="150" height="150">
      <p id="track-name">Loading...</p>
    </div>
    
    <div id="controls">
      <button id="prev-button" tag="control" title="Previous Track">|<<</button>
      <button id="play-pause-button" tag="control" title="Play/Pause">></button>
      <button id="next-button" tag="control" title="Next Track">>>|</button>
    </div>
    
    
    <script src="config.js"></script>
    <script src="musicDex.js"></script>
  </body>
</html>
